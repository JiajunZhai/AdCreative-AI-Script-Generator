server {
    listen 80;
    server_name localhost;

    # Serve static frontend files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Support for React Router / SPA history fallback
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for FastAPI backend
    location /api/ {
        # 'avocado-backend' is the docker-compose service name
        proxy_pass http://avocado-backend:8000/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming responses (SSE) if used
        proxy_buffering off;
        proxy_cache off;
        
        # Increase timeouts for long-running AI requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
